<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miam Miam Food — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Caveat+Brush&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="assets/styles.css">
<style>
  .main-area { background: #FAF7F2; }
  .kpi-card-modern {
    background: white;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.25rem;
    transition: all 0.2s;
  }
  .kpi-card-modern:hover {
    border-color: var(--burgundy);
    box-shadow: 0 10px 30px rgba(74,16,25,0.08);
    transform: translateY(-2px);
  }
  .data-row:hover { background: #FAF7F2; cursor: pointer; }
  .data-row td { padding: 0.9rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
  .data-table thead th { padding: 0.7rem 1rem; background: #FAF7F2; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 700; border-bottom: 1px solid var(--border); text-align: left; }
</style>
</head>
<body class="min-h-screen flex">

<!-- ============ SIDEBAR ============ -->
<aside id="sidebar" class="sidebar-mobile fixed lg:relative w-64 h-screen bg-burgundy-deep text-cream p-4 z-40 flex flex-col flex-shrink-0">
  <!-- Logo -->
  <div class="flex items-center gap-3 pb-4 mb-4 border-b border-cream/15">
    <span class="logo-mark"><svg width="20" viewBox="0 0 24 24" fill="currentColor"><path d="M11 2v8.5h2V2h-2zM8 2v9c0 1.1.9 2 2 2v9h2v-9c1.1 0 2-.9 2-2V2h-2v7H10V2H8zm9 0c-1.66 0-3 1.34-3 3v7h2v9h2V2z"/></svg></span>
    <div>
      <div class="font-display text-base leading-none">MIAM MIAM</div>
      <div class="text-xs text-cream/50 mt-0.5" id="role-label">Admin Panel</div>
    </div>
  </div>

  <!-- Nav -->
  <nav class="flex-1 space-y-1 overflow-y-auto no-scrollbar">
    <div class="text-[10px] uppercase tracking-widest text-cream/40 px-3 py-2">Aperçu</div>
    <a class="nav-item active" data-page="dashboard">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>

    <div class="text-[10px] uppercase tracking-widest text-cream/40 px-3 py-2 mt-2">Opérations</div>
    <a class="nav-item" data-page="orders">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3l8 -8"/><path d="M20 12v6a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2v-12a2 2 0 0 1 2 -2h9"/></svg>
      Commandes
      <span class="ml-auto bg-gold text-burgundy-deep text-[10px] font-bold px-2 py-0.5 rounded-full" id="nav-orders-badge">0</span>
    </a>
    <a class="nav-item" data-page="newOrder">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Nouvelle commande
    </a>

    <div class="text-[10px] uppercase tracking-widest text-cream/40 px-3 py-2 mt-2">Gestion</div>
    <a class="nav-item" data-page="menu">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 2v8.5h2V2h-2zM8 2v9c0 1.1.9 2 2 2v9h2v-9c1.1 0 2-.9 2-2V2h-2v7H10V2H8zm9 0c-1.66 0-3 1.34-3 3v7h2v9h2V2z"/></svg>
      Menu
    </a>
    <a class="nav-item owner-only" data-page="analytics">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Statistiques
    </a>
    <a class="nav-item owner-only" data-page="employees">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0 -4 -4h-6a4 4 0 0 0 -4 4v2"/><circle cx="10" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0 -3 -3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Employés
    </a>
    <a class="nav-item owner-only" data-page="settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Paramètres
    </a>
  </nav>

  <!-- User -->
  <div class="border-t border-cream/15 pt-4 mt-4">
    <div class="flex items-center gap-3 px-2">
      <div id="user-avatar" class="w-10 h-10 rounded-full bg-gold text-burgundy-deep flex items-center justify-center font-bold">?</div>
      <div class="flex-1 min-w-0">
        <div class="font-bold text-cream text-sm truncate" id="user-name">—</div>
        <div class="text-xs text-cream/50" id="user-role">—</div>
      </div>
      <button onclick="window.MMAuth.logout()" class="text-cream/60 hover:text-gold p-1.5" title="Déconnexion">
        <svg width="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>
</aside>

<!-- Mobile sidebar overlay -->
<div id="sidebar-overlay" class="hidden lg:hidden fixed inset-0 bg-burgundy-deep/50 z-30" onclick="toggleSidebar()"></div>

<!-- ============ MAIN ============ -->
<main class="main-area flex-1 min-w-0 overflow-x-hidden">
  <!-- Topbar -->
  <div class="bg-white border-b border-border sticky top-0 z-20">
    <div class="flex items-center justify-between px-4 lg:px-6 py-3">
      <div class="flex items-center gap-3">
        <button class="lg:hidden p-2 -ml-2" onclick="toggleSidebar()">
          <svg width="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="text-xs sm:text-sm text-muted hidden sm:inline">
          <span class="live-dot mr-1"></span> Connecté en direct
        </span>
      </div>
      <div class="flex items-center gap-2">
        <button class="relative p-2 hover:bg-cream rounded-lg" onclick="showToast('Aucune nouvelle notification')">
          <svg width="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full"></span>
        </button>
        <a href="index.html" target="_blank" class="text-xs text-burgundy hover:text-gold font-bold hidden sm:inline">↗ Voir le site</a>
      </div>
    </div>
  </div>

  <!-- Page container -->
  <div class="p-4 lg:p-6 max-w-[1500px]" id="page-container">
    <!-- Pages injected here -->
  </div>
</main>

<!-- ============ MODALS ============ -->
<div id="modal" class="modal-backdrop">
  <div class="modal-content p-6" id="modal-content">
    <!-- dynamic -->
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="assets/data.js?v=4"></script>
<script src="assets/auth.js?v=4"></script>
<script src="assets/dashboard.js?v=4"></script>
</body>
</html>
